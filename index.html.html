<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reliance Gulf ERP</title>
  <!-- Tailwind CSS CDN for Modern UI -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7fe] text-slate-800 min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- 1. Header Card -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
      <h1 class="text-2xl font-bold text-slate-900">Reliance Gulf ERP</h1>
      <p class="text-sm text-slate-500">Employee Profile Registration Form</p>
    </div>

    <!-- ========================================================= -->
    <!-- SECTION 3.1: GENERAL INFORMATION -->
    <!-- ========================================================= -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
      <h2 class="text-sm font-bold text-blue-600 tracking-wider uppercase">
        3.1 General Information
      </h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Company Name Dropdown -->
        <div class="flex flex-col space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase">Company Name *</label>
          <select
            id="companyName"
            required
            class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          >
            <option value="">Select Company</option>
            <option value="Reliance Gulf">Reliance Gulf</option>
            <option value="Reliance International">Reliance International</option>
          </select>
        </div>

        <!-- Employee Name -->
        <div class="flex flex-col space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase">Employee Name</label>
          <input
            type="text"
            placeholder="Enter Full Name"
            class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
          />
        </div>
      </div>
    </div>

    <!-- ========================================================= -->
    <!-- SECTION 3.5: OTHER DETAILS (Renamed) -->
    <!-- ========================================================= -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
      <h2 class="text-sm font-bold text-blue-600 tracking-wider uppercase">
        3.5 Other Details
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase">Joining Date</label>
          <input
            type="date"
            class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div class="flex flex-col space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase">Email Address</label>
          <input
            type="email"
            placeholder="employee@reliancegulf.com"
            class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
    </div>

    <!-- ========================================================= -->
    <!-- SECTION 3.6: TECHNICAL CERTIFICATIONS (Dynamic Dropdown) -->
    <!-- ========================================================= -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
      <h2 class="text-sm font-bold text-blue-600 tracking-wider uppercase">
        3.6 Technical Certifications
      </h2>

      <!-- Add Certificate Form Controls -->
      <div class="bg-slate-50 p-4 rounded-xl space-y-4 border border-slate-100">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <!-- Dropdown Select -->
          <div class="flex flex-col space-y-1">
            <label class="text-[10px] font-bold text-slate-500 uppercase">Select Certification</label>
            <select
              id="certSelect"
              class="border border-slate-200 rounded-lg p-2.5 bg-white text-xs focus:outline-none focus:ring-1 focus:ring-blue-500"
            >
              <option value="">-- Choose Certificate --</option>
              <option value="H2S Certificate">H2S Certificate</option>
              <option value="ATA Training">ATA Training</option>
              <option value="Rigger Certificate">Rigger Certificate</option>
              <option value="Scaffolder Training">Scaffolder Training</option>
              <option value="ADNOC Medical Details">ADNOC Medical Details</option>
              <option value="First Aid Training">First Aid Training</option>
              <option value="Fire Safety Certificate">Fire Safety Certificate</option>
            </select>
          </div>

          <!-- Date Input -->
          <div class="flex flex-col space-y-1">
            <label class="text-[10px] font-bold text-slate-500 uppercase">Add Date / Expiry</label>
            <input
              id="certDate"
              type="date"
              class="border border-slate-200 rounded-lg p-2.5 bg-white text-xs focus:outline-none focus:ring-1 focus:ring-blue-500"
            />
          </div>

          <!-- Remark Input -->
          <div class="flex flex-col space-y-1">
            <label class="text-[10px] font-bold text-slate-500 uppercase">Remark (Optional)</label>
            <input
              id="certRemark"
              type="text"
              placeholder="e.g. Active, Score: 90%"
              class="border border-slate-200 rounded-lg p-2.5 bg-white text-xs focus:outline-none focus:ring-1 focus:ring-blue-500"
            />
          </div>
        </div>

        <!-- Add Date Button -->
        <div class="flex justify-end">
          <button
            type="button"
            onclick="addCertification()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-xs py-2 px-4 rounded-lg transition-all shadow-sm"
          >
            + Add Date
          </button>
        </div>
      </div>

      <!-- Certifications List Container -->
      <div id="certificationsTableContainer" class="hidden">
        <div class="overflow-hidden border border-slate-100 rounded-xl">
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                <th class="p-3">Certification Name</th>
                <th class="p-3">Date / Expiry</th>
                <th class="p-3">Remarks</th>
                <th class="p-3 text-right">Action</th>
              </tr>
            </thead>
            <tbody id="certificationsBody" class="divide-y divide-slate-100">
              <!-- Dynamically Added Rows Go Here -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- No Certifications Added Placeholder -->
      <p id="noCertPlaceholder" class="text-xs text-slate-400 text-center py-4 bg-slate-50/30 rounded-xl border border-dashed border-slate-200">
        No certifications added yet. Use the dropdown above to add.
      </p>
    </div>

    <!-- ========================================================= -->
    <!-- SECTION 3.7: WORKING STATUS & DEPLOYMENT (Two Cells) -->
    <!-- ========================================================= -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
      <h2 class="text-sm font-bold text-blue-600 tracking-wider uppercase">
        3.7 Working Status & Deployment
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- CELL 1: System Status & Dynamic Cancel Date -->
        <div class="space-y-4">
          <div class="flex flex-col space-y-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase">System Status *</label>
            <select
              id="systemStatus"
              onchange="toggleCancelDate()"
              class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            >
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>

          <!-- Dynamic Cancel Date Input (Shown when Inactive is Selected) -->
          <div id="cancelDateWrapper" class="hidden flex flex-col space-y-1.5">
            <label class="text-xs font-bold text-red-500 uppercase">Cancel Date *</label>
            <input
              id="cancelDate"
              type="date"
              class="w-full border border-red-200 rounded-xl p-3 bg-red-50/30 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition-all"
            />
          </div>
        </div>

        <!-- CELL 2: Deployment Status (Dynamic Signs) -->
        <div class="flex flex-col space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase">Deployment Status</label>
          <div class="relative">
            <select
              id="deploymentStatus"
              onchange="updateDeploymentIcon()"
              class="w-full border border-slate-200 rounded-xl p-3 bg-slate-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all appearance-none pl-10"
            >
              <option value="On Site">On Site</option>
              <option value="On Leave">On Leave</option>
              <option value="Idle">Idle</option>
            </select>
            
            <!-- Dynamic Status Icon -->
            <div class="absolute left-3.5 top-3.5 text-base pointer-events-none">
              <span id="statusIcon" class="text-emerald-500 animate-pulse">📍</span>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- ========================================================= -->
  <!-- JAVASCRIPT LOGIC -->
  <!-- ========================================================= -->
  <script>
    // System Status Change Logic
    function toggleCancelDate() {
      const status = document.getElementById('systemStatus').value;
      const cancelDateWrapper = document.getElementById('cancelDateWrapper');
      const cancelDateInput = document.getElementById('cancelDate');

      if (status === 'Inactive') {
        cancelDateWrapper.classList.remove('hidden');
        cancelDateInput.setAttribute('required', 'required');
      } else {
        cancelDateWrapper.classList.add('hidden');
        cancelDateInput.removeAttribute('required');
        cancelDateInput.value = ''; // Reset date
      }
    }

    // Deployment Status Icon Logic
    function updateDeploymentIcon() {
      const status = document.getElementById('deploymentStatus').value;
      const iconSpan = document.getElementById('statusIcon');

      if (status === 'On Site') {
        iconSpan.innerHTML = '📍';
        iconSpan.className = 'text-emerald-500 animate-pulse';
      } else if (status === 'On Leave') {
        iconSpan.innerHTML = '🏖️';
        iconSpan.className = ''; // Remove animation
      } else if (status === 'Idle') {
        iconSpan.innerHTML = '💤';
        iconSpan.className = 'text-amber-500';
      }
    }

    // Dynamic Certifications Management Array
    let addedCertifications = [];

    function renderCertifications() {
      const tableContainer = document.getElementById('certificationsTableContainer');
      const placeholder = document.getElementById('noCertPlaceholder');
      const tableBody = document.getElementById('certificationsBody');

      // Clear existing UI table rows
      tableBody.innerHTML = '';

      if (addedCertifications.length > 0) {
        tableContainer.classList.remove('hidden');
        placeholder.classList.add('hidden');

        addedCertifications.forEach((cert, index) => {
          const row = document.createElement('tr');
          row.className = 'hover:bg-slate-50/50 transition-all';
          row.innerHTML = `
            <td class="p-3 font-semibold text-slate-700">${cert.name}</td>
            <td class="p-3 text-slate-600">${cert.date}</td>
            <td class="p-3 text-slate-500">${cert.remark || '-'}</td>
            <td class="p-3 text-right">
              <button
                type="button"
                onclick="removeCertification(${index})"
                class="text-red-500 hover:text-red-700 font-medium"
              >
                Remove
              </button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      } else {
        tableContainer.classList.add('hidden');
        placeholder.classList.remove('hidden');
      }
    }

    function addCertification() {
      const certSelect = document.getElementById('certSelect');
      const certDate = document.getElementById('certDate');
      const certRemark = document.getElementById('certRemark');

      const selectedValue = certSelect.value;
      const dateValue = certDate.value;
      const remarkValue = certRemark.value;

      if (!selectedValue || !dateValue) {
        alert('Please select a certificate and provide a date!');
        return;
      }

      // Check if duplicate
      const alreadyExists = addedCertifications.some(c => c.name === selectedValue);
      if (alreadyExists) {
        alert('This certificate is already added to the list.');
        return;
      }

      // Push to our memory array
      addedCertifications.push({
        name: selectedValue,
        date: dateValue,
        remark: remarkValue
      });

      // Reset Form fields
      certSelect.value = '';
      certDate.value = '';
      certRemark.value = '';

      // Re-render UI
      renderCertifications();
    }

    function removeCertification(index) {
      addedCertifications.splice(index, 1);
      renderCertifications();
    }
  </script>
</body>
</html>
